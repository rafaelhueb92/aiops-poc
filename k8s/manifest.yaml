apiVersion: v1
kind: Namespace
metadata:
  name: kube-news
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: kube-news
type: Opaque
stringData:
  POSTGRES_DB: kubedevnews
  POSTGRES_USER: kubedevnews
  POSTGRES_PASSWORD: "Pg#123"
  DB_DATABASE: kubedevnews
  DB_USERNAME: kubedevnews
  DB_PASSWORD: "Pg#123"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: kube-news
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: kube-news
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U kubedevnews -d kubedevnews
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U kubedevnews -d kubedevnews
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: postgres-storage
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-news-app
  namespace: kube-news
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kube-news-app
  template:
    metadata:
      labels:
        app: kube-news-app
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.28
          command: ['sh', '-c', 'until nc -z postgres-service 5432; do echo waiting for db; sleep 2; done']
      containers:
        - name: kube-news-app
          image: rafahueb/kube-news:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: postgres-service
            - name: DB_PORT
              value: "5432"
            - name: DB_SSL_REQUIRE
              value: "false"
            - name: NODE_ENV
              value: production
          envFrom:
            - secretRef:
                name: postgres-secret
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: kube-news-service
  namespace: kube-news
spec:
  type: LoadBalancer
  selector:
    app: kube-news-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
